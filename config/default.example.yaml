串口: COM10
采样率: 250
通道数: 8

滤波:
  启用: true
  带通低频_hz: 0.5
  带通高频_hz: 45.0
  陷波低频_hz: 49.0
  陷波高频_hz: 51.0

lsl:
  eeg流名称: OpenBCI_EEG
  加速度流名称: OpenBCI_Accel
