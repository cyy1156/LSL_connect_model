# =============================================================================
# 采集服务默认配置 — 复制为 default.yaml 后修改
# =============================================================================

串口: COM10
使用合成板: true          # true：无硬件测试，不占串口
采样率: 250
通道数: 8

滤波:
  启用: true
  带通低频_hz: 0.5
  带通高频_hz: 45.0
  陷波低频_hz: 49.0
  陷波高频_hz: 51.0

采集:
  单批上限: 25
  后台安静: true            # CLI 下不刷 [统计]

lsl:
  eeg流名称: OpenBCI_EEG
  加速度流名称: OpenBCI_Accel