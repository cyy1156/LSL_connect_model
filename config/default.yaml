# =============================================================================
# 采集服务默认配置 — 可由控制台 UI「保存配置」更新
# =============================================================================

串口: COM10
使用合成板: false          # true：无硬件测试
采样率: 250
通道数: 8

滤波:
  启用: true
  带通低频_hz: 0.5
  带通高频_hz: 45.0
  陷波低频_hz: 49.0
  陷波高频_hz: 51.0

采集:
  单批上限: 25
  后台安静: true

lsl:
  eeg流名称: OpenBCI_EEG
  加速度流名称: OpenBCI_Accel
  # 顺序 = CH1…CH8 数据列（与 CSV 表头一致）
  eeg通道标签:
    - CZ
    - C3
    - CPZ3
    - FC4
    - FC3
    - CPZ4
    - C4
    - CPZ

gui推流:
  启用: true
  ip: 225.1.1.1
  端口: 6677

录制:
  启用: true
  保存目录: data/recordings
  文件前缀: eeg
  包含加速度: false
  停止采集时自动停录: true
  flush间隔秒: 2.0
